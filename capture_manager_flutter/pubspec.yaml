name: capture_manager_flutter
description: "Screenshot auto-classifier for macOS and Android."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database (SQLite ORM, macOS + Android)
  drift: ^2.26.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.4

  # OCR — Android only (macOS uses Vision via MethodChannel)
  google_mlkit_text_recognition: ^0.14.0

  # File watching — macOS FSEvents via dart:io
  watcher: ^1.1.1

  # Android background service
  flutter_foreground_task: ^8.17.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Directory picker (replaces NSOpenPanel)
  file_picker: ^10.1.7

  # macOS launch at login (replaces SMAppService)
  launch_at_startup: ^0.3.0

  # Path utilities
  path: ^1.9.1
  path_provider: ^2.1.5

  # Thumbnail generation (replaces NSImage+Thumbnail.swift)
  image: ^4.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.26.1
  riverpod_generator: ^2.6.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
